name: Lint

permissions:
  contents: read
  pull-requests: read

on:
  - pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CLICOLOR: 1

jobs:
  changes:
    name: Detect lint changes
    runs-on: ubuntu-latest
    outputs:
      fmt: ${{ steps.filter.outputs.fmt }}
      nix: ${{ steps.filter.outputs.nix }}
      node: ${{ steps.filter.outputs.node }}
      actions: ${{ steps.filter.outputs.actions }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            fmt:
              - 'treefmt.toml'
              - '.oxfmtrc.json'
              - 'stylua.toml'
              - '**/*.nix'
              - '**/*.ts'
              - '**/*.json'
              - '**/*.sh'
              - '**/*.lua'
              - '**/*.toml'
            nix:
              - 'flake.lock'
              - '**/*.nix'
            node:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - '.oxlintrc.json'
              - '**/*.ts'
            actions:
              - '.github/workflows/**'
              - '.github/actions/**'

  treefmt:
    name: treefmt
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.fmt == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-treefmt-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-treefmt-${{ runner.os }}-
      - run: nix fmt -- --fail-on-change

  deadnix:
    name: deadnix
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.nix == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-deadnix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-deadnix-${{ runner.os }}-
      - run: nix run nixpkgs#deadnix -- --fail .

  statix:
    name: statix
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.nix == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-statix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-statix-${{ runner.os }}-
      - run: nix run nixpkgs#statix -- check .

  oxlint:
    name: oxlint
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.node == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-oxlint-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-oxlint-${{ runner.os }}-
      - run: nix build .#checks.x86_64-linux.oxlint

  tsc:
    name: tsc
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.node == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.actions == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-actionlint-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-actionlint-${{ runner.os }}-
      - run: nix run nixpkgs#actionlint

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.actions == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-zizmor-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-zizmor-${{ runner.os }}-
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run nixpkgs#zizmor -- .

  all-lint-passed:
    name: All Lint Passed
    runs-on: ubuntu-latest
    needs:
      - treefmt
      - deadnix
      - statix
      - oxlint
      - tsc
      - actionlint
      - zizmor
    if: ${{ always() }}
    steps:
      - name: Verify all lint jobs passed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          if [[ "$RESULTS" == *failure* || "$RESULTS" == *cancelled* ]]; then
            echo "One or more jobs failed or were cancelled: $RESULTS"
            exit 1
          fi
