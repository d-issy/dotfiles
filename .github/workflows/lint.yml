name: Lint

permissions:
  contents: read
  pull-requests: read

on:
  - pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CLICOLOR: 1

jobs:
  changes:
    name: Detect lint changes
    runs-on: ubuntu-latest
    outputs:
      fmt: ${{ steps.filter.outputs.fmt }}
      nix: ${{ steps.filter.outputs.nix }}
      node: ${{ steps.filter.outputs.node }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            fmt:
              - 'treefmt.toml'
              - '.oxfmtrc.json'
              - 'stylua.toml'
              - '**/*.nix'
              - '**/*.ts'
              - '**/*.json'
              - '**/*.sh'
              - '**/*.lua'
              - '**/*.toml'
            nix:
              - 'flake.lock'
              - '**/*.nix'
            node:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - '.oxlintrc.json'
              - '**/*.ts'

  treefmt:
    name: treefmt
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.fmt == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-treefmt-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-treefmt-${{ runner.os }}-
      - run: nix fmt -- --fail-on-change

  deadnix:
    name: deadnix
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.nix == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-deadnix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-deadnix-${{ runner.os }}-
      - run: nix run nixpkgs#deadnix -- --fail .

  statix:
    name: statix
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.nix == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-statix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-statix-${{ runner.os }}-
      - run: nix run nixpkgs#statix -- check .

  oxlint:
    name: oxlint
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.node == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec oxlint

  tsc:
    name: tsc
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.node == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  all-lint-passed:
    name: All Lint Passed
    runs-on: ubuntu-latest
    needs:
      - treefmt
      - deadnix
      - statix
      - oxlint
      - tsc
    if: ${{ always() }}
    steps:
      - name: Verify all lint jobs passed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          if [[ "$RESULTS" == *failure* || "$RESULTS" == *cancelled* ]]; then
            echo "One or more jobs failed or were cancelled: $RESULTS"
            exit 1
          fi
