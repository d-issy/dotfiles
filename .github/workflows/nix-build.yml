name: Nix Build

permissions:
  contents: read

on:
  - pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CLICOLOR: 1

jobs:
  home-manager-activation-package:
    name: home-manager activationPackage (${{ matrix.config }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: linux
            os: ubuntu-latest
            attr: .#homeConfigurations.linux.activationPackage
          - config: macos
            os: macos-latest
            attr: .#homeConfigurations.macos.activationPackage
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix build ${{ matrix.attr }}

  all-nix-build-passed:
    name: All Nix Build Passed
    runs-on: ubuntu-latest
    needs:
      - home-manager-activation-package
    if: ${{ always() }}
    steps:
      - name: Verify all Nix build jobs passed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          if [[ "$RESULTS" == *failure* || "$RESULTS" == *cancelled* || "$RESULTS" == *skipped* ]]; then
            echo "One or more jobs did not pass: $RESULTS"
            exit 1
          fi
