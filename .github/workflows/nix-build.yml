name: Nix Build

permissions:
  contents: read
  pull-requests: read

on:
  - pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CLICOLOR: 1

jobs:
  changes:
    name: Detect Nix changes
    runs-on: ubuntu-latest
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            nix:
              - 'flake.lock'
              - '**/*.nix'

  home-manager-activation-package:
    name: home-manager activationPackage (${{ matrix.config }})
    runs-on: ${{ matrix.os }}
    needs:
      - changes
    if: ${{ needs.changes.outputs.nix == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: linux
            os: ubuntu-latest
            attr: .#homeConfigurations.linux.activationPackage
          - config: macos
            os: macos-latest
            attr: .#homeConfigurations.macos.activationPackage
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix build ${{ matrix.attr }}

  all-nix-build-passed:
    name: All Nix Build Passed
    runs-on: ubuntu-latest
    needs:
      - changes
      - home-manager-activation-package
    if: ${{ always() }}
    steps:
      - name: Verify all Nix build jobs passed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          if [[ "$RESULTS" == *failure* || "$RESULTS" == *cancelled* ]]; then
            echo "One or more jobs failed or were cancelled: $RESULTS"
            exit 1
          fi
