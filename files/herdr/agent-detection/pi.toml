id = "pi"
version = "2026.07.10.4"
min_engine_version = 2
updated_at = "2026-07-10T00:00:00Z"
aliases = ["herdr:pi"]

[[rules]]
id = "focus_confirmation_blocked"
state = "blocked"
priority = 900
region = "whole_recent"
visible_blocker = true
any = [
  { contains = [
    "Enter focus:",
    "write reject reason",
    "Esc cancel",
  ] },
  { contains = [
    "Agent requesting focus:",
    "write reject reason",
    "Esc cancel",
  ] },
  { contains = [
    "Exit focus:",
    "write reject reason",
    "Esc cancel",
  ] },
]

[[rules]]
id = "reject_reason_editor_blocked"
state = "blocked"
priority = 890
region = "whole_recent"
visible_blocker = true
contains = ["Provide Reject Reason"]
any = [
  { contains = [
    "Focus:",
  ] },
  { contains = [
    "Enter reason:",
  ] },
  { contains = [
    "Exit reason:",
  ] },
]

[[rules]]
id = "interview_question_blocked"
state = "blocked"
priority = 880
region = "whole_recent"
visible_blocker = true
any = [
  { contains = [
    "Ask about this question",
    "Tab edits Other",
    "Esc cancel",
  ] },
  { contains = [
    "Ask about this question",
    "Space toggles choice",
    "Esc cancel",
  ] },
]

[[rules]]
id = "interview_other_editor_blocked"
state = "blocked"
priority = 870
region = "whole_recent"
visible_blocker = true
contains = ["Provide Other Answer", "Question:"]

[[rules]]
id = "active_literal"
state = "working"
priority = 100
region = "whole_recent"
visible_working = true
line_regex = ['^\s*[⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏]\s+(Working|Thinking)(\.\.\.|…)\s*(\(|$)']
not = [
  { contains = [
    "Enter focus:",
  ] },
  { contains = [
    "Agent requesting focus:",
  ] },
  { contains = [
    "Exit focus:",
  ] },
  { contains = [
    "Provide Reject Reason",
  ] },
  { contains = [
    "Ask about this question",
  ] },
  { contains = [
    "Provide Other Answer",
  ] },
]
